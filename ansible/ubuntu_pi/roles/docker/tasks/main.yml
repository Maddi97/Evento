- name: apt Update
  apt: 
    update_cache: yes
      
- name: Install curl 
  apt: 
    name: curl
    state: present

- name: Install apt-transport-https
  apt:
    name: apt-transport-https
    state: present

- name: Install ca-certificates
  apt:
    name: ca-certificates
    state: present

- name: apt Update
  apt: 
    update_cache: yes

- name: Get GPG key
  command: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/docker-archive-keyring.gpg >/dev/null

- name: Add GPG key
  command: echo "deb [signed-by=/usr/share/keyrings/docker-archive-keyring.gpg arch=$(dpkg --print-architecture)] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee -a /etc/apt/sources.list.d/docker.list

- name: apt Update
  apt: 
    update_cache: yes

- name: Install docker
  apt: 
    name: docker-ce
    state: present

- name: Add docker group
  group:
    name: docker
    state: present

- name: Add User to docker group
  command: gpasswd -a {{ user }} docker

- name: Activate Changes
  command: newgrp docker
